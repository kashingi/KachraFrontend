<!-- Hero Section -->
<section class="hero-section" id="home">
  <div class="container">
    <div class="row align-items-center min-vh-100">
      <div class="col-lg-6">
        <div class="hero-content">
          <h1 class="hero-title">
            Fresh and Organic
            <span class="text-primary">Products for You</span>
          </h1>
          <p class="hero-description">
            Sourced Fresh Daily From Local Farms Around Nairobi. 
            Taste the Difference Quality Makes!
          </p>
          <button mat-raised-button color="primary" routerLink="/products" class="shop-now-btn">
            <mat-icon>shopping_basket</mat-icon>
            Shop Now
          </button>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="hero-image">
          <img src="https://images.pexels.com/photos/1300972/pexels-photo-1300972.jpeg" alt="Fresh Vegetables" class="img-fluid">
        </div>
      </div>
    </div>
  </div>
</section>


<!-- Features Section -->
<app-features id="features"></app-features>

<!-- Products Section -->
<app-products id="products"></app-products>

<!-- Categories Section -->
<app-categories id="categories"></app-categories>

<!-- Blogs Section -->
<app-blogs id="blogs"></app-blogs>
