<section class="blogs-section" id="blogs">
  <div class="container">
    <h2 class="section-title text-center mb-5">
      Our <span class="text-primary">Blogs</span>
    </h2>
    
    <div class="row">
      <div class="col-lg-4 col-md-6 mb-4" *ngFor="let blog of blogs">
        <mat-card class="blog-card h-100">
          <div class="blog-image">
            <img [src]="blog.image" [alt]="blog.title" class="img-fluid">
          </div>
          
          <mat-card-content>
            <div class="blog-meta">
              <span class="author">
                <mat-icon>person</mat-icon>
                by {{ blog.author }}
              </span>
              <span class="date">
                <mat-icon>calendar_today</mat-icon>
                {{ blog.date | date }}
              </span>
            </div>
            
            <h3>{{ blog.title }}</h3>
            <p class="blog-content">{{ blog.content }}</p>
          </mat-card-content>
          
          <mat-card-actions>
            <button mat-button color="primary">
              <mat-icon>arrow_forward</mat-icon>
              Read More
            </button>
          </mat-card-actions>
        </mat-card>
      </div>
    </div>
  </div>
</section>
