<div class="product-management">
  <div class="container-fluid">
    <div class="management-header">
      <h2>
        <mat-icon>inventory</mat-icon>
        Category Management
      </h2>

      <button mat-raised-button color="primary" (click)="openAddCategoryDialog()">
        <mat-icon>add</mat-icon>
        Add Category
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-5">
      <mat-spinner></mat-spinner>
    </div>

    <!-- Products Table -->
    <mat-card *ngIf="!loading" class="products-table-card">
      <div class="card-header float-end">
        <div class="float-end d-flex">
          <button mat-icon-button (click)="exportToPDF()" matTooltip="Export as PDF">
            <mat-icon color="warn">picture_as_pdf</mat-icon>
          </button>
          <button mat-icon-button (click)="exportToExcel()" matTooltip="Export as Excel">
            <mat-icon color="primary">table_chart</mat-icon>
          </button>
        </div>
      </div>
      <mat-card-content>
        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="w-100">
            <!-- Image Column -->

            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>ID</th>
              <td mat-cell *matCellDef="let user; let i = index">
                {{ i + 1 }}
              </td>
            </ng-container>

            <ng-container matColumnDef="image">
              <th mat-header-cell *matHeaderCellDef>Image</th>
              <td mat-cell *matCellDef="let category">
                <img [src]="getImageSrc(category.categoryImage)" [alt]="category.name" class="product-image" />
              </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let category">{{ category.name }}</td>
            </ng-container>

            <!-- Discount Column -->
            <ng-container matColumnDef="discount">
              <th mat-header-cell *matHeaderCellDef>Discount</th>
              <td mat-cell *matCellDef="let category">
                <mat-chip>{{ category.discount }}</mat-chip>
              </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let category">
                <mat-chip [ngClass]="category.status ? 'active' : 'inactive'">
                  {{ category.status ? "Active" : "Inactive" }}
                </mat-chip>
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let category">
                <button mat-icon-button [matMenuTriggerFor]="productMenu">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #productMenu="matMenu">
                  <button mat-menu-item (click)="editCategory(category)">
                    <mat-icon color="primary">edit</mat-icon>
                    Edit
                  </button>
                  <button mat-menu-item (click)="toggleCategoryStatus(category)">
                    <mat-icon color="accent">{{
                      category.status ? "visibility_off" : "visibility"
                      }}</mat-icon>
                    {{ category.status ? "Deactivate" : "Activate" }}
                  </button>
                  <button mat-menu-item (click)="handleDeleteAction(category)">
                    <mat-icon color="warn">delete</mat-icon>
                    Delete
                  </button>
                </mat-menu>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>

        <!-- Pagination -->
        <mat-paginator [pageSizeOptions]="[2, 5, 10, 20]" showFirstLastButtons [pageSize]="2" [length]="totalCategories">
        </mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</div>
