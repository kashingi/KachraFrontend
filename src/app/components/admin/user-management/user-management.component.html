<div class="user-management">
  <div class="container-fluid">
    <div class="management-header">
      <h2>
        <mat-icon>people</mat-icon>
        User Management
      </h2>
      <button mat-raised-button color="primary" (click)="openAddUserDialog()">
        <mat-icon>add</mat-icon>
        Add User
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-5">
      <mat-spinner></mat-spinner>
    </div>

    <!-- Users Table -->
    <mat-card *ngIf="!loading" class="users-table-card">
      <div class="card-header float-end">
        <div class="float-end d-flex">
          <button mat-icon-button (click)="exportToPDF()" matTooltip="Export as PDF">
            <mat-icon color="warn">picture_as_pdf</mat-icon>
          </button>
          <button mat-icon-button (click)="exportToExcel()" matTooltip="Export as Excel">
            <mat-icon color="primary">table_chart</mat-icon>
          </button>
        </div>
      </div>
      <mat-card-content>
        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="w-100">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>ID</th>
              <td mat-cell *matCellDef="let user; let i = index">
                {{ i + 1 }}
              </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let user">
                {{ user.name }}
              </td>
            </ng-container>

            <!-- Email Column -->
            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef>Email</th>
              <td mat-cell *matCellDef="let user">{{ user.email }}</td>
            </ng-container>

            <!-- Contact Column -->
            <ng-container matColumnDef="contact">
              <th mat-header-cell *matHeaderCellDef>Contact</th>
              <td mat-cell *matCellDef="let user">{{ user.contact }}</td>
            </ng-container>

            <!-- Role Column -->
            <ng-container matColumnDef="role">
              <th mat-header-cell *matHeaderCellDef>Role</th>
              <td mat-cell *matCellDef="let user">
                <mat-chip [ngClass]="user.role">{{
                  user.role | titlecase
                  }}</mat-chip>
              </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let user">
                <mat-chip [ngClass]="user.isActive ? 'active' : 'inactive'">
                  {{ user.isActive ? "Active" : "Inactive" }}
                </mat-chip>
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let user">
                <button mat-icon-button [matMenuTriggerFor]="userMenu">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #userMenu="matMenu">
                  <button mat-menu-item (click)="editUser(user)">
                    <mat-icon color="primary">edit</mat-icon>
                    Edit
                  </button>
                  <button mat-menu-item (click)="toggleUserStatus(user)">
                    <mat-icon color="accent">{{
                      user.isActive ? "block" : "check_circle"
                      }}</mat-icon>
                    {{ user.isActive ? "Deactivate" : "Activate" }}
                  </button>
                  <button mat-menu-item (click)="handleDeleteAction(user)">
                    <mat-icon color="warn">delete</mat-icon>
                    Delete
                  </button>
                </mat-menu>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>

        <!-- Pagination -->
        <mat-paginator [pageSizeOptions]="[2, 5, 10, 20]" showFirstLastButtons [pageSize]="2" [length]="totalUsers">
        </mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</div>
